                        <label class="text-sm font-medium text-slate-700">Sede o Asesor</label>

                            <option value="Punto de Venta Cali Centro">Punto de Venta Cali Centro</option>

                        <label class="text-sm font-medium text-slate-700 self-start mt-3">Falla Reportada</label>
                        <textarea id="t_falla" required rows="3" class="border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:border-slate-500 w-full"></textarea>

                    <div class="flex justify-end gap-4 pt-6">

                        </div>
                        <div class="flex items-center gap-3 col-span-2 md:col-span-1">
                            <span class="text-[11px] font-bold text-slate-400 uppercase w-16">Teléfono</span>
                            <div class="border border-slate-200 bg-slate-50 rounded-lg px-4 py-2.5 text-sm text-slate-700 flex-1 truncate" id="det_telefono">-</div>

                        <span class="text-sm font-bold text-slate-800 hidden md:block"></span>
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-bold text-slate-400 uppercase w-16">Nombre</span>
                            <div class="border border-slate-200 bg-slate-50 rounded-lg px-4 py-2.5 text-sm text-slate-700 flex-1 truncate" id="det_nombre">-</div>
                        </div>
                        <div class="flex items-center gap-3 col-span-2 md:col-span-1">
                            <span class="text-[11px] font-bold text-slate-400 uppercase w-16">Sede</span>
                            <div class="border border-slate-200 bg-slate-50 rounded-lg px-4 py-2.5 text-sm text-slate-700 flex-1 truncate" id="det_sede">-</div>
                        </div>

                        <div class="col-span-full h-px bg-slate-100 my-2"></div>

                        <span class="text-sm font-bold text-slate-800">Producto</span>
                        <div class="flex items-center gap-3 col-span-2 md:col-span-3">

                        <div class="flex items-start gap-3 col-span-2 md:col-span-3">
                            <span class="text-[11px] font-bold text-slate-400 uppercase w-16 pt-3">Falla</span>
                            <div class="border border-slate-200 bg-slate-50 rounded-lg px-4 py-3 text-sm text-slate-700 w-full min-h-[60px]" id="det_falla">-</div>
                        </div>

                <div class="mb-10">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-slate-800">Informe de Servicio Técnico</h3>
                    </div>
                    <textarea id="txtDiagnostico" rows="4" class="w-full border border-slate-300 rounded-xl p-5 text-sm text-slate-800 focus:outline-none focus:border-slate-500 shadow-sm" placeholder="Escribe aquí el dictamen técnico..."></textarea>
                    
                    <div id="btnSaveDiagDiv" class="hidden mt-4 flex justify-end">
                        <button onclick="guardarInformeTecnico()" class="bg-[#1e1b4b] hover:bg-[#312e81] text-white text-sm font-semibold px-6 py-2.5 rounded-lg shadow-md transition-colors">Guardar y Marcar Diagnosticado</button>

                <div id="det_galeria" class="hidden">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">Evidencias Fotográficas</h3>
                    <div class="flex gap-4 overflow-x-auto pb-4" id="det_fotos_div">
                        </div>
                </div>

            </div>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyD3-LS_bVWfNFgf2DL0ol8PO7P_EW8IBMc",
                authDomain: "bdd-garantias.firebaseapp.com",
                projectId: "bdd-garantias",
                storageBucket: "bdd-garantias.firebasestorage.app",
                messagingSenderId: "679720630745",
                appId: "1:679720630745:web:0b5e6bba2e0ee9700a81c8",
                measurementId: "G-M2C68T6NJ8"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const storage = firebase.storage();
            const ticketsRef = db.collection('tickets');
            const counterRef = db.collection('metadata').doc('ticketCounter');

            let ticketsGlobal = [];
            let currentTicketIdAbierto = null; // Para saber qué ticket está abierto en el modal

            // DEFINICIÓN DE COLUMNAS (Minimalistas)
            const ESTADOS = [
                { id: '1_recibir', nombre: 'RECEPCIÓN' },
                { id: '2_envio_st', nombre: 'ENVIADOS A S.T.' },
                { id: '3_diagnosticado', nombre: 'DIAGNOSTICADOS' },
                { id: '4_reparado', nombre: 'REPARADOS' },
                { id: '5_sin_reparacion', nombre: 'PÉRDIDA / SIN ARREGLO' },
                { id: '6_entregado_asesor', nombre: 'ENTREGA ASESOR' },
                { id: '7_entregado_cliente', nombre: 'ENTREGADOS' }
            ];

            auth.onAuthStateChanged(user => {
                if (!user) window.location.href = 'index.html';
                else {
                    const inicial = user.email.charAt(0).toUpperCase();
                    document.getElementById('userInitial').textContent = inicial;
                }
            });
            document.getElementById('logoutBtn').onclick = () => auth.signOut();

            // Dibujar Pizarra Kanban
            function dibujarColumnas() {
                const board = document.getElementById('kanbanBoard');
                board.innerHTML = ESTADOS.map(col => `
                    <div class="w-[340px] flex-shrink-0 flex flex-col">
                        <div class="flex justify-between items-center mb-5 px-1">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">${col.nombre}</h3>
                            <button class="text-slate-300 hover:text-slate-500"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM16 12a2 2 0 100-4 2 2 0 000 4z"></path></svg></button>
                        </div>
                        <div class="space-y-4 overflow-y-auto pb-10" id="col-${col.id}"></div>
                    </div>
                `).join('');
            }
            dibujarColumnas();

            // Generador de ID (TICKET 1, TICKET 2...)
            async function getNextTicketId() {
                return await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(counterRef);
                    let current = 0;
                    if (doc.exists) current = doc.data().count || 0;
                    const next = current + 1;
                    transaction.set(counterRef, { count: next }, { merge: true });
                    return `TICKET ${next}`;
                });
            }

            // CREAR TICKET NUEVO
            document.getElementById('formGarantia').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btnSubmit = document.getElementById('btnSubmit');
                btnSubmit.textContent = "Procesando..."; btnSubmit.disabled = true;

                try {
                    const ticketId = await getNextTicketId();
                    const files = document.getElementById('t_fotos').files;
                    let fotosUrls = [];

                    if (files.length > 0) {
                        for (let file of files) {
                            const fileRef = storage.ref(`evidencias/${ticketId}/${file.name}`);
                            await fileRef.put(file);
                            fotosUrls.push(await fileRef.getDownloadURL());
                        }
                    }

                    await ticketsRef.doc(ticketId).set({
                        id: ticketId,
                        estado: '1_recibir',
                        taller: document.getElementById('t_taller').value,
                        cedula: document.getElementById('t_cedula').value,
                        telefono: document.getElementById('t_telefono').value,
                        nombre: document.getElementById('t_nombre').value,
                        sede: document.getElementById('t_sede').value,
                        referencia: document.getElementById('t_referencia').value,
                        falla: document.getElementById('t_falla').value,
                        diagnostico: "",
                        fotos: fotosUrls,
                        creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    document.getElementById('formGarantia').reset();
                    document.getElementById('modalNuevoTicket').classList.add('hidden');
                } catch (error) {
                    alert("Error. Verifica Firestore.");
                } finally {
                    btnSubmit.textContent = "Generar Ticket"; btnSubmit.disabled = false;
                }
            });

            // ESCUCHAR Y PINTAR TABLERO
            document.getElementById('filtroTaller').addEventListener('change', renderizarTarjetas);

            ticketsRef.orderBy('creadoEn', 'desc').onSnapshot(snapshot => {
                ticketsGlobal = [];
                snapshot.forEach(doc => ticketsGlobal.push(doc.data()));
                renderizarTarjetas();
            });

            function renderizarTarjetas() {
                const tallerSeleccionado = document.getElementById('filtroTaller').value;
                ESTADOS.forEach(c => document.getElementById(`col-${c.id}`).innerHTML = '');

                ticketsGlobal.forEach(t => {
                    if (t.taller === tallerSeleccionado && document.getElementById(`col-${t.estado}`)) {
                        document.getElementById(`col-${t.estado}`).innerHTML += crearTarjetaHTML(t);
                    }
                });
            }

            // DISEÑO DE TARJETA (Estilo Imagen 0)
            function crearTarjetaHTML(t) {
                const diagTexto = t.diagnostico ? t.diagnostico.substring(0, 40) + '...' : 'Esperando revisión...';
                return `
                    <div onclick="verDetalle('${t.id}')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 cursor-pointer hover:shadow-md transition-shadow relative group">
                        <h4 class="font-bold text-slate-900 text-lg mb-4 tracking-tight">${t.id}</h4>
                        <div class="space-y-1.5 text-[13px] text-slate-500 mb-4 border-b border-slate-50 pb-4">
                            <p><span class="font-semibold text-slate-800">Producto:</span> <span class="truncate inline-block align-bottom max-w-[150px]">${t.referencia}</span></p>
                            <p><span class="font-semibold text-slate-800">Sede:</span> <span class="truncate inline-block align-bottom max-w-[150px]">${t.sede}</span></p>
                        </div>
                        <p class="text-[12px] text-slate-400 italic">${diagTexto}</p>
                    </div>`;
            }

            // MODAL DETALLE (La vista de trabajo gigante)
            window.verDetalle = (id) => {
                const t = ticketsGlobal.find(x => x.id === id);
                if(!t) return;
                currentTicketIdAbierto = id;

                // Llenar datos fijos
                document.getElementById('det_id').textContent = t.id;
                document.getElementById('det_cedula').textContent = t.cedula;
                document.getElementById('det_telefono').textContent = t.telefono;
                document.getElementById('det_nombre').textContent = t.nombre;
                document.getElementById('det_sede').textContent = t.sede;
                document.getElementById('det_referencia').textContent = t.referencia;
                document.getElementById('det_falla').textContent = t.falla;

                // Controlar Caja de Diagnóstico
                const txtDiag = document.getElementById('txtDiagnostico');
                const btnSaveDiag = document.getElementById('btnSaveDiagDiv');
                txtDiag.value = t.diagnostico || "";
                
                // Si está en 'Enviado a ST', permitimos escribir. De lo contrario, solo lectura.
                if(t.estado === '2_envio_st') {
                    txtDiag.readOnly = false;
                    txtDiag.classList.add('bg-white');
                    txtDiag.classList.remove('bg-slate-50', 'text-slate-500');
                    btnSaveDiag.classList.remove('hidden');
                } else {
                    txtDiag.readOnly = true;
                    txtDiag.classList.add('bg-slate-50', 'text-slate-500');
                    txtDiag.classList.remove('bg-white');
                    btnSaveDiag.classList.add('hidden');
                }

                // Generar Botones de Acción Superiores Dinámicos
                const boxBotones = document.getElementById('det_actions_top');
                boxBotones.innerHTML = '';
                
                const crearBtn = (texto, clase, accion, sigEstado) => {
                    return `<button onclick="cambiarEstado('${t.id}', '${sigEstado}')" class="px-5 py-2 rounded-lg text-sm font-semibold transition-colors shadow-sm ${clase}">${texto}</button>`;
                };

                if(t.estado === '1_recibir') {
                    boxBotones.innerHTML += crearBtn('Enviar a S.T.', 'bg-[#1e1b4b] text-white hover:bg-[#312e81]', 'enviar', '2_envio_st');
                }
                if(t.estado === '3_diagnosticado') {
                    boxBotones.innerHTML += crearBtn('Marcar Reparado', 'bg-emerald-600 text-white hover:bg-emerald-700', 'reparar', '4_reparado');
                    boxBotones.innerHTML += crearBtn('Pérdida Total', 'bg-[#1e1b4b] text-white hover:bg-[#312e81]', 'perdida', '5_sin_reparacion');
                }
                if(t.estado === '4_reparado' || t.estado === '5_sin_reparacion') {
                    boxBotones.innerHTML += crearBtn('Entregar a Asesor', 'bg-[#1e1b4b] text-white hover:bg-[#312e81]', 'asesor', '6_entregado_asesor');
                }
                if(t.estado === '6_entregado_asesor') {
                    boxBotones.innerHTML += crearBtn('Cerrar Ticket (Entregado)', 'bg-slate-800 text-white hover:bg-black', 'cliente', '7_entregado_cliente');
                }

                // Fotos
                const boxFotos = document.getElementById('det_galeria');
                const divFotos = document.getElementById('det_fotos_div');
                divFotos.innerHTML = "";
                if(t.fotos && t.fotos.length > 0) {
                    t.fotos.forEach(url => {
                        divFotos.innerHTML += `<a href="${url}" target="_blank" class="shrink-0"><div class="w-32 h-32 rounded-xl bg-slate-100 border border-slate-200 bg-cover bg-center hover:opacity-80 transition-opacity" style="background-image: url('${url}')"></div></a>`;
                    });
                    boxFotos.classList.remove('hidden');
                } else {
                    boxFotos.classList.add('hidden');
                }

                document.getElementById('modalDetalle').classList.remove('hidden');
            };

            // ACCIONES DE BASE DE DATOS
            window.cambiarEstado = async (id, nuevoEstado) => {
                await ticketsRef.doc(id).update({ estado: nuevoEstado });
                document.getElementById('modalDetalle').classList.add('hidden'); // Cierra modal
            };

            window.guardarInformeTecnico = async () => {
                const texto = document.getElementById('txtDiagnostico').value;
                if(!texto) return alert("Por favor, escribe el informe técnico antes de guardar.");
                
                await ticketsRef.doc(currentTicketIdAbierto).update({ 
                    diagnostico: texto,
                    estado: '3_diagnosticado' // Avanza automáticamente
                });
                document.getElementById('modalDetalle').classList.add('hidden'); // Cierra modal
            };

        });
    </script>
</body>
</html>
