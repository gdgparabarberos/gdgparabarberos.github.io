<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garantías PARABARBEROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-50 text-slate-800">

    <div class="w-full max-w-md p-10 bg-white rounded-[24px] shadow-xl border border-slate-100">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 mb-6 border border-indigo-100">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h1 class="text-[26px] font-bold text-slate-900 tracking-tight">GARANTÍAS</h1>
            <p class="text-sm text-slate-500 mt-1 font-medium tracking-widest uppercase">Parabarberos S.A.S.</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="analista@parabarberos.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" placeholder="••••••••">
            </div>
            <div id="errorMessage" class="text-red-500 text-sm text-center font-medium h-5"></div>
            
            <button type="submit" id="btnIngresar" class="w-full py-3.5 px-4 bg-[#1e1b4b] hover:bg-[#312e81] text-white font-semibold rounded-xl shadow-lg shadow-indigo-900/10 transition-colors mt-4">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // TU CONFIGURACIÓN DE FIREBASE (Garantías)
            const firebaseConfig = {
                apiKey: "AIzaSyD3-LS_bVWfNFgf2DL0ol8PO7P_EW8IBMc",
                authDomain: "bdd-garantias.firebaseapp.com",
                projectId: "bdd-garantias",
                storageBucket: "bdd-garantias.firebasestorage.app",
                messagingSenderId: "679720630745",
                appId: "1:679720630745:web:0b5e6bba2e0ee9700a81c8",
                measurementId: "G-M2C68T6NJ8"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const btnIngresar = document.getElementById('btnIngresar');

            // Si ya está logueado, redirige automático al app
            auth.onAuthStateChanged(user => {
                if (user) {
                    window.location.href = 'app.html';
                }
            });

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                errorMessage.textContent = 'Verificando...';
                errorMessage.className = 'text-indigo-500 text-sm text-center font-medium h-5';
                btnIngresar.disabled = true;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        window.location.href = 'app.html';
                    })
                    .catch((error) => {
                        console.error("Error Auth:", error);
                        errorMessage.className = 'text-red-500 text-sm text-center font-medium h-5';
                        errorMessage.textContent = 'Credenciales incorrectas. Inténtalo de nuevo.';
                        btnIngresar.disabled = false;
                    });
            });
        });
    </script>
</body>
</html>
