<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garantías PARABARBEROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-900 text-slate-900">

    <div class="w-full max-w-md p-10 bg-white rounded-[24px] shadow-2xl border border-slate-200">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900 mb-2 uppercase tracking-tight">Parabarberos SAS</h1>
            <p class="text-sm text-slate-500 font-bold tracking-widest uppercase">Portal de Control Interno</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wide">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="analista@parabarberos.com">
            </div>
            <div>
                <label for="password" class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wide">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="••••••••">
            </div>
            <div id="errorMessage" class="text-red-500 text-sm text-center font-bold h-5"></div>
            
            <button type="submit" id="btnIngresar" class="w-full py-4 px-4 bg-slate-950 hover:bg-black text-white font-bold rounded-xl shadow-lg shadow-slate-900/10 transition-colors mt-2">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyD3-LS_bVWfNFgf2DL0ol8PO7P_EW8IBMc",
                authDomain: "bdd-garantias.firebaseapp.com",
                projectId: "bdd-garantias",
                storageBucket: "bdd-garantias.firebasestorage.app",
                messagingSenderId: "679720630745",
                appId: "1:679720630745:web:0b5e6bba2e0ee9700a81c8",
                measurementId: "G-M2C68T6NJ8"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const btnIngresar = document.getElementById('btnIngresar');

            auth.onAuthStateChanged(user => {
                if (user) window.location.href = 'app.html';
            });

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                errorMessage.textContent = 'Verificando...';
                errorMessage.className = 'text-slate-500 text-sm text-center font-bold h-5';
                btnIngresar.disabled = true;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => window.location.href = 'app.html')
                    .catch((error) => {
                        errorMessage.className = 'text-red-600 text-sm text-center font-bold h-5';
                        errorMessage.textContent = 'Credenciales incorrectas.';
                        btnIngresar.disabled = false;
                    });
            });
        });
    </script>
</body>
</html>
