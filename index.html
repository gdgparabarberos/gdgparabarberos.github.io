<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garantías PARABARBEROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        /* Fondo moderno con gradiente animado sutil */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen font-sans antialiased text-slate-200">

    <div class="w-full max-w-md p-8 m-4 bg-slate-900/60 backdrop-blur-xl rounded-3xl shadow-2xl border border-slate-700/50">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-600/20 mb-4 border border-indigo-500/30">
                <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">GARANTÍAS</h1>
            <p class="text-sm text-indigo-300 mt-1 font-medium tracking-widest">PARABARBEROS S.A.S.</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-400 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="analista@parabarberos.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-400 mb-1">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="••••••••">
            </div>
            <div id="errorMessage" class="text-red-400 text-sm text-center font-medium h-5"></div>
            
            <button type="submit" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-900/20 transition-all duration-200 transform hover:-translate-y-0.5">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        // Aquí irá tu configuración de Firebase y la lógica de inicio de sesión que ya tienes dominada.
    </script>
</body>
</html>
